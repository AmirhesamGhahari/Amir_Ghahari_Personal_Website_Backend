version: 0.2
# Backend build spec for amirghahari-backend-pipeline.
# Runs in CodeBuild on every push to main.
# Expects the LAMBDAS_BUCKET environment variable set by the CodeBuild project in 02-cicd-backend.yaml.

phases:
  install:
    runtime-versions:
      python: 3.12

  build:
    commands:
      # Package Lambda function
      - cd lambda/post_contact
      - zip website_post_contact.zip website_post_contact.py
      - aws s3 cp website_post_contact.zip s3://${LAMBDAS_BUCKET}/website_post_contact.zip
      - echo "Lambda ZIP uploaded to s3://${LAMBDAS_BUCKET}/website_post_contact.zip"

